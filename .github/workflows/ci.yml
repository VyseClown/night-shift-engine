name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ── Job A: Shell lint ───────────────────────────────────────────────────────
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin shellcheck so "green locally" == "green in CI". Ubuntu's apt build
      # lags (0.9.0) and reports findings newer versions don't, so an unpinned
      # install drifts. Bump SC_VERSION deliberately, in sync with what the
      # repo-root .shellcheckrc + inline pragmas were validated against.
      - name: Install shellcheck (pinned)
        env:
          SC_VERSION: "0.11.0"
        run: |
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SC_VERSION}/shellcheck-v${SC_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ
          sudo install "shellcheck-v${SC_VERSION}/shellcheck" /usr/local/bin/shellcheck

      # Full-coverage lint of every scripts/**/*.sh (orchestrator, libs, extracted
      # fixtures, worktree wrapper) at default severity. The style/false-positive
      # noise that previously forced --severity=error is now handled precisely by
      # the repo-root .shellcheckrc (categorical false positives only) plus visible
      # inline pragmas — so this is the "tighten once cleaned up" follow-through.
      # `find -exec {} +` passes all files robustly (no word-split / IFS quirks).
      - name: Shellcheck
        run: |
          shellcheck --version
          find scripts -name '*.sh' -type f -exec shellcheck -s bash {} +

  # ── Job B: Deterministic fixture suite ─────────────────────────────────────
  fixtures:
    name: Fixture tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure jq is available
        run: command -v jq || { sudo apt-get update && sudo apt-get install -y jq; }

      # --dry-run keeps this 100% offline — no paid API calls are made.
      # NIGHT_SHIFT_ACCEPT_COSTS=YES is required to pass the cost-acceptance
      # guard inside the script; it does NOT trigger real spending when
      # combined with --dry-run.
      - name: Run fixture suite
        run: NIGHT_SHIFT_ACCEPT_COSTS=YES bash scripts/night-shift.sh --fixture-test --dry-run
