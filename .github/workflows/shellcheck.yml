name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        # Lints every tracked *.sh under scripts/ (orchestrator, libs, and the
        # extracted test fixtures). Honors the repo-root .shellcheckrc. `find`
        # tolerates the layout changing (e.g. scripts/test/ added later) without
        # editing this workflow. Fails the job on any finding.
        run: |
          shellcheck --version
          echo "Linting:"; find scripts -name '*.sh' -type f | sort
          # shellcheck reads .shellcheckrc from the working directory (repo root).
          # -exec ... + passes all files as args robustly (no word-split / IFS quirks).
          find scripts -name '*.sh' -type f -exec shellcheck -s bash {} +
