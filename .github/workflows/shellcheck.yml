name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck (pinned)
        # Pin the version so "green locally" == "green in CI". Ubuntu's apt
        # shellcheck lags (0.9.0) and reports findings newer versions don't, so
        # an unpinned install drifts. Bump SC_VERSION deliberately, in sync with
        # what the suppressions were validated against.
        env:
          SC_VERSION: "0.11.0"
        run: |
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SC_VERSION}/shellcheck-v${SC_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJ
          sudo install "shellcheck-v${SC_VERSION}/shellcheck" /usr/local/bin/shellcheck
      - name: Lint shell scripts
        # Lints every tracked *.sh under scripts/ (orchestrator, libs, and the
        # extracted test fixtures). Honors the repo-root .shellcheckrc. `find`
        # tolerates the layout changing (e.g. scripts/test/ added later) without
        # editing this workflow. Fails the job on any finding.
        run: |
          shellcheck --version
          echo "Linting:"; find scripts -name '*.sh' -type f | sort
          # shellcheck reads .shellcheckrc from the working directory (repo root).
          # -exec ... + passes all files as args robustly (no word-split / IFS quirks).
          find scripts -name '*.sh' -type f -exec shellcheck -s bash {} +
